name: Backend Golang CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'

defaults:
  run:
    working-directory: backend

jobs:
  test-and-scan:
    name: Test & Image Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Golang Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install Project Dependencies
        run: go mod download

      - name: Execute Go Testing Framework Suite
        run: go test -v ./...

      - name: Setup Docker Buildx Engine
        uses: docker/setup-buildx-action@v3

      - name: Build Local Container Image for Scan Verification
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true
          tags: starttech-backend:test

      # Scans the newly minted image for OS level CVE vulnerabilities
      - name: Scan Docker Image via Aqua Security Trivy Engine
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'starttech-backend:test'
          format: 'table'
          exit-code: '1' # Fails the pipeline run if high vulnerabilities are uncovered
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  publish-and-deploy:
    name: ECR Publish & ASG Rolling Upgrade
    needs: test-and-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Authenticate Administrative AWS Session
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log In directly to Amazon ECR Private Registry
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Tagged Container Image to ECR Production Registry
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_NAME }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_NAME }}:${{ github.sha }}

      # Triggers the custom roll out mechanics and infrastructure execution
      - name: Run Backend Multi-Instance Rolling Invalidation
        run: |
          chmod +x ../scripts/deploy-backend.sh
          chmod +x ../scripts/health-check.sh
          ../scripts/deploy-backend.sh
        env:
          ASG_NAME: ${{ secrets.AWS_ASG_NAME }}
          ALB_HEALTH_URL: "http://${{ secrets.AWS_ALB_DNS_NAME }}/health"